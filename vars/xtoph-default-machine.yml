##
## MACHINE PROFILES
##



##
## LIBVIRT/KVM ENTRIES
##

##     <machine>.osinfo    ... used by virt-install by-pass auto selected optimized VM machine type/parms
##                             assists PXE installs which cannot predetermine (auto detect) os info
##                             running `osinfo-query os` on libvirt host can provide available values
##
##     <machine>.dev_hints ... combined with kickstart.family to provide hints to device paths
##                             used by kickstart config / kernel arg templates to specifiy devices
##

kvm_vda_q35:
      description: "KVM vm / pc-q35 / sparse virtio storage"
      platform: "libvirt"
      osinfo: "{{ h_osINFO | default('rhel9-unknown') }}"
      kickstart:
        blkdev: "{{ h_blkDEV | default('') }}"
        netdev: "{{ h_netDEV | default('') }}"
        kernel_opts: "{{ h_krnOPT | default('') }}"
        dev_hints:
          description: "Hints to devices based on kickstart_profile.family"
          default:
            blkdev: "vda"
            netdev: "enp1s0"
            kernel_opts: ""
          rhel9:
            blkdev: "vda"
            netdev: "enp1s0"
            kernel_opts: ""
          rhel8:
            blkdev: "vda"
            netdev: "enp1s0"
            kernel_opts: ""
          rhel7:
            blkdev: "vda"
            netdev: "eth0"
            kernel_opts: ""
      boot_mode: "bios"
      storage:
        default:
          bus: "virtio"
          sparse: "true"
      network:
        default:
          ip: "{{ h_netIP | default('') }}"
          mac: "{{ h_netMAC| default('') }}"

kvm_vda:
      description: "KVM vm using sparse virtio storage"
