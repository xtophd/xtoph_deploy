##
## KAYTUS ENTRIES
##


kaytus-kr2280:
      platform: "baremetal"
      description: "KEYTUS KR2280-X3-A0-R0-00"
      kickstart:
        blkdev: "{{ h_blkDEV | default('') }}"
        netdev: "{{ h_netDEV | default('') }}"
        kernel_opts: "{{ h_krnOPT | default('') }}"
        dev_hints:
          description: "Hints to devices based on kickstart_profile.family"
          default:
            blkdev: "nvme0n1"
            netdev: "ens3f0"
            kernel_opts: "module_blacklist=iaa_crypto,intel_qat"
          rhel7:
            blkdev: "sda"
            netdev: "em1"
      boot_mode: "uefi"
      storage:
        default:
      network:
        default:
          ip: "{{ h_netIP | default('') }}"
          mac: "{{ h_netMAC| default('') }}"
      bmc:
        fqdn:            "{{ bmc_fqdn | default('') }}"
        login_status:    "redfish-openbmc-login-status.py"
        power_status:    "redfish-openbmc-power-status.py"
        power_on:        "redfish-openbmc-power-on.py"
        power_off:       "redfish-openbmc-power-off.py"
        media_status:    "redfish-openbmc-vmedia-status.py"
        media_eject:     "redfish-openbmc-vmedia-eject.py"
        media_insert:    "redfish-openbmc-vmedia-insert.py"
        bootonce_media:  "redfish-openbmc-bootonce-media.py"
        bootonce_pxe:    "redfish-openbmc-bootonce-pxe.py"
        bootonce_clear:  "redfish-openbmc-bootonce-clear.py"
        custom_actions:  "redfish-noop.py"
        reset:           ""



